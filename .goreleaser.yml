version: 2

project_name: cla-worker

before:
  hooks:
    - go mod tidy
    - go test -race ./internal/... ./cmd/...

builds:
  - id: cla-worker
    main: .
    binary: cla-worker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/clarive/cla-worker-go/internal/version.Version={{.Version}}

archives:
  - id: cla-worker
    builds:
      - cla-worker
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
